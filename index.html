<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gesture & Voice Music Player</title>
    <link rel="stylesheet" href="style.css">
    
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Material+Symbols+Rounded:opsz,wght,FILL,GRAD@24,400,1,0" />
    
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/camera_utils/camera_utils.js" crossorigin="anonymous"></script>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/hands/hands.js" crossorigin="anonymous"></script>
</head>
<body>

    <div class="app-background"></div>
    <div class="app-container">
        <video id="webcam" autoplay playsinline style="display: none;"></video>
        <audio id="audio-player"></audio>

        <div class="player-card">
            <div id="voice-indicator" class="voice-indicator">
                <div class="waveform">
                    <span></span><span></span><span></span><span></span>
                </div>
                Listening...
            </div>

            <div class="album-art-container">
                <div id="album-art" class="album-art">
                    <span class="material-symbols-rounded music-icon">music_note</span>
                    <div class="vinyl-center"></div>
                </div>
            </div>

            <div class="track-info">
                <h1 id="track-title">Waiting for command...</h1>
                <p id="player-state" class="state-text">Status: PAUSED</p>
            </div>

            <div class="progress-container">
                <div class="progress-bar">
                    <div id="progress-fill" class="progress-fill"></div>
                </div>
            </div>

            <div class="gesture-guide">
                <h3><span class="material-symbols-rounded">front_hand</span> Gesture Controls</h3>
                <div class="gesture-grid">
                    <div class="gesture-item">
                        <span class="emoji">✊</span>
                        <span>Pause</span>
                    </div>
                    <div class="gesture-item">
                        <span class="emoji">👍</span>
                        <span>Play</span>
                    </div>
                    <div class="gesture-item">
                        <span class="emoji">✌️</span>
                        <span>Speak</span>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
