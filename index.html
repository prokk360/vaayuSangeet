<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Maestro AI | Cloud Edition</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/camera_utils/camera_utils.js" crossorigin="anonymous"></script>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/hands/hands.js" crossorigin="anonymous"></script>
</head>
<body>
    <div class="app-background" id="app-bg">
        <div class="circle circle-1"></div>
        <div class="circle circle-2"></div>
    </div>
    
    <video id="webcam" autoplay playsinline style="display: none;"></video>

    <div class="glass-container">
        <div id="gesture-glow" class="gesture-glow"></div>

        <header class="top-nav">
            <div class="logo">
                <div class="logo-icon"><i class="fa-solid fa-compact-disc"></i></div>
                <span>MAESTRO AI</span>
            </div>
            <div id="gesture-status" class="gesture-status"></div>
            <div class="search-icon"><i class="fa-solid fa-bars-staggered"></i></div>
        </header>

        <main class="main-content">
            <section class="player-controls">
                <div class="voice-box" id="voice-indicator">
                    <div class="waveform">
                        <span></span><span></span><span></span><span></span>
                    </div>
                    <span id="voice-text">LISTENING</span>
                </div>

                <div class="play-circle" id="play-btn">
                    <i class="fa-solid fa-play" id="play-icon"></i>
                </div>

                <div class="timeline-area">
                    <div class="time-meta">
                        <span id="current-time">0:00</span>
                    </div>
                    <div class="progress-bar" id="progress-container">
                        <div class="progress" id="progress"></div>
                    </div>
                </div>
            </section>

            <section class="album-showcase">
                <div class="album-card" id="album-card">
                    <div class="album-art-wrapper">
                        <div id="album-art-placeholder" class="album-art-placeholder"><img src="music.png" alt="" srcset="">
                        </div>
                        <img src="" id="album-img" style="display:none;">
                    </div>
                    <div class="song-info">
                        <h2 id="track-title">SILENCE</h2>
                        <p id="player-state">AWAITING COMMAND</p>
                    </div>
                </div>
            </section>

            <section class="gesture-section">
                <div class="gesture-guide">
                    <h3>GESTURES</h3>
                    <ul>
                        <li><span class="g-icon">👍</span> PLAY</li>
                        <li><span class="g-icon">✊</span> PAUSE</li>
                        <li><span class="g-icon">✌️</span> SEARCH</li>
                    </ul>
                </div>
                </div>
            </section>
        </main>
    </div>

    <audio id="audio-player"></audio>
    <script src="script.js"></script>
</body>
</html>
